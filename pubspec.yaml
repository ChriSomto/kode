name: gradclock
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.1.0
  just_audio: ^0.10.5
  home_widget: ^0.9.2+1
  workmanager: ^0.9.0+3
  shared_preferences: ^2.5.5
  confetti: ^0.8.0
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8
  audio_service: ^0.18.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/icon.jpeg"
  adaptive_icon_foreground: "assets/icon/icon.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icon/